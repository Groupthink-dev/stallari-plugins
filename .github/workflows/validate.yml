name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git+ssh://git@github.com/"

      - name: Install deps
        run: npm ci

      - name: Generate context
        run: node scripts/build-forge-context.js

      - name: Validate pack manifests
        run: node scripts/validate-packs.js

      - name: Security scan
        run: node scripts/security-scan.js

      - name: Test build scripts
        run: node --test scripts/*.test.js

      - name: Build catalog (dry run)
        env:
          STRICT_UX: "1"
        run: node scripts/build-catalog.js

      - name: Trigger registry deploy
        if: github.ref == 'refs/heads/main'
        run: |
          gh api repos/Groupthink-dev/stallari-registry-infra/dispatches \
            -f event_type=catalog-updated
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_DISPATCH_PAT }}
