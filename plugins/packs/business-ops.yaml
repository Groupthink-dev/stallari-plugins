pack: "1.7"
name: business-ops
title: "Business Operations"
featured: false
version: "1.0.0"
tagline: "Revenue, accounting, payroll, and compliance in one operator"
description: >-
  Multi-service business operations automation — subscription revenue tracking,
  double-entry accounting reconciliation, payroll compliance, and regulatory
  reporting. Three services, one operator, fourteen skills that follow the money
  from billing to BAS lodgement.
icon: /icons/business-ops.svg
author:
  name: groupthink-dev
  url: https://github.com/groupthink-dev
license: MIT
visibility: open
author_type: first-party
readiness: beta
pricing: null
bundled: false

readme:
  format: markdown
  body: |
    # Business Operations Pack

    Multi-service business operations for Stallari — subscription revenue
    tracking, double-entry accounting reconciliation, payroll compliance,
    and regulatory reporting. Connects billing, accounting, and vault into
    a coherent financial operations layer.

    ## What it does

    This pack treats your billing and accounting platforms as one observable
    pipeline. Revenue flows in from subscriptions, expenses flow out to
    vendors, payroll runs on schedule, and compliance deadlines tick down.
    Your agent reconciles, reports, and alerts across all of it.

    ### Revenue (billing service)

    - **Subscription dashboard** — MRR, churn rate, ARPU, LTV on demand
    - **Churn alert** — daily detection of cancellations and past-due subscriptions
    - **Refund processor** — policy-checked refund requests with human approval gate

    ### Accounting (accounting service)

    - **Invoice reconciliation** — cross-reference billing transactions against
      accounting invoices on the 1st and 15th
    - **Monthly financials** — revenue breakdown, expenses, margin, and runway
    - **Expense entry** — structure and post expense records to accounting from
      user-provided amounts or vault cost notes
    - **Cost anomaly** — weekly trend analysis across expense categories
    - **Tax prep** — quarterly summary for your external accountant
    - **Vendor reconciliation** — match accounting expenses against billing transactions

    ### Payroll (accounting service, payroll scope)

    - **Payroll summary** — pay run status, upcoming dates, leave balances
    - **Super compliance** — monthly superannuation guarantee payment checks
    - **Leave balances** — employee leave accruals and entitlement checks

    ### Compliance (vault + accounting)

    - **BAS lodgement prep** — quarterly BAS data pull from accounting reports
    - **Compliance digest** — monthly scan of vault-tracked deadlines (ASIC
      review dates, insurance renewals, contract expiry)

    ## Who this is for

    Small businesses and SaaS operators who use separate billing and accounting
    platforms and want automated reconciliation, churn detection, expense
    tracking, payroll visibility, and compliance preparation without building
    custom integrations.

    ## Safety model

    - **All accounting writes require explicit human confirmation** — the pack
      never auto-posts expenses, bills, or adjustments
    - **All billing writes (refunds) require explicit human confirmation** —
      the pack never auto-refunds
    - **Payroll access is strictly read-only** — no pay run modifications,
      no leave adjustments, no superannuation changes
    - Revenue figures are **rounded in stdout** and exact only in vault notes
      (always `publish: false`)
    - Customer PII is **hashed or truncated in logs** — full details only in
      vault notes
    - **Graceful degradation** — billing service is recommended, not required.
      Accounting-only mode works without billing, skipping revenue skills

