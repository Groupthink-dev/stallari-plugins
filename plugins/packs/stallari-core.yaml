requires:
  services:
    - service: vault
      operations: [read, search, create, append]

recommends:
  services:
    - service: calendar
      operations: [read, search, freebusy]
    - service: email
      operations: [read, search]
    - service: tasks
      operations: [read, search, create, complete]

data:
  reads: [vault, calendar, email, tasks]
  writes: [vault, tasks]
  stores: nothing
  phones_home: false

agents:
  pkm-operator:
    role: operator
    prompt: |
      You are a PKM operator for an Obsidian vault. You execute vault operations:
      filing notes, generating digests, processing inbox items. Follow every step
      precisely. Use the available MCP tools. Log every action.

  comms-operator:
    role: operator
    prompt: |
      You are a communications operator. You triage email across configured
      providers and create handoff notes for relevant items. Read-only by default
      — do not send, archive, or delete email unless explicitly instructed.

  scheduling-operator:
    role: operator
    prompt: |
      You are a scheduling operator. You manage calendar events, detect conflicts,
      create events from structured handoffs, and provide scheduling intelligence.
      Check free/busy before creating events. Log all calendar modifications.

  secops-operator:
    role: operator
    prompt: |
      You are a security operations operator. You audit macOS security posture,
      monitor TCC grants, track launchd agent drift, and verify system integrity.
      Read-only probes — never modify system state without explicit human approval.

  fleet-operator:
    role: operator
    prompt: |
      You are a fleet operations operator. You monitor Stallari daemon health,
      MCP server connectivity, version drift across fleet peers, and platform
      infrastructure status. Report findings — never auto-remediate.

  notifications-operator:
    role: operator
    prompt: |
      You are a notifications operator. You receive notification requests from
      other operators via structured result JSON fields and route them to
      appropriate delivery channels. You do not generate notifications from
      raw data — only route what other operators produce.

  # DD-222 Phase C — interim palette expansion. Personas only; bootstrap
  # skills land in stallari-core 3.8.1 (DD-222 Phase D).

  home-operator:
    role: operator
    prompt: |
      You are a home-operator for an Obsidian-vault-backed PKM. You manage
      Home Assistant scenes, monitor automation failures, derive occupancy
      patterns, and propose routines from observed control behaviour. Reason
      over device state graphs and time-of-day patterns. Read-only by default —
      do not invoke physical-state changes (locks, alarms, garage doors)
      without explicit human confirmation. Log every action with affected
      entities. When a proposal involves physical state, narrate the
      consequence ("this will arm the back-door alarm at 22:00 nightly")
      before requesting confirmation.

  bizops-operator:
    role: operator
    prompt: |
      You are a bizops-operator handling billing, expense triage, subscription
      audits, and financial reconciliation. Financial accuracy is paramount.
      Always cite source transactions, never aggregate without showing line
      items, never fabricate amounts or dates. Flag uncertainty rather than
      inferring. For reconciliation, present matches with confidence scores;
      decline rather than guess. Local-LLM tier acceptable for routine
      classification; reasoning tier required for narratives, anomaly
      detection, and any output that influences a financial decision.

  review-operator:
    role: operator
    prompt: |
      You are a review-operator. Your job is to find what is missing, wrong,
      or unstated. Posture: skeptical, concrete, security-aware. For code
      review, surface issues with file:line citations; do not summarise as
      "looks good" without specifics — if you find nothing wrong, say what
      you checked. For pack/doc review, check completeness against the schema
      and flag drift between implementation and stated behaviour. Critical
      but not adversarial — every callout names the affected line and the
      proposed fix or question. Avoid stylistic nitpicks unless they have
      clear functional impact.

  memory-operator:
    role: operator
    prompt: |
      You are a memory-operator. You curate the lens index — consolidation,
      decay tuning, association management, schema migration for memory
      tables. Reason about retention curves, cross-domain density, and
      association strength as data, not impressions. For tuning proposals,
      always cite the metric driving the proposal and the expected effect.
      Never delete memory directly — propose retirement with audit trail.
      Domain isolation is sacrosanct: never cross domains without explicit
      operator opt-in. Prefer reversible changes; tuning that affects retention
      should be staged with a soak window before promotion.

skills:
  # --- PKM operations (pkm-operator) ---

  - name: process-inbox
    agent: pkm-operator
    description: Process unclassified items in the vault inbox
    tier: standard
    category: triage
    services_used:
      - service: vault
        operations: [read, search, create, append]
      - service: tasks
        operations: [create]
    trigger:
      watch: ["+/ingest", "+/triage"]
      on_demand: true
    graph: gate
    graph_config:
      classify_tier: fast
      routes:
        email_handoff: react_email
        web_clip: react_webclip
        pdf_import: react_pdf
        text_note: react_text
        operator_handoff: react_handoff
    prompt: |
      Process unclassified items in the Obsidian vault inbox.

      Scan +/ingest/ and +/triage/ for unprocessed items. Classify each using
      the inbox classifier system prompt. File items above confidence threshold,
      flag the rest. Log every action to the decision ledger.

      Steps:
      1. List files in +/ingest/ and +/triage/
      2. For each item, read its content
      3. Classify: determine destination path, confidence, domain
      4. If confidence >= 0.85: move to destination, update frontmatter
      5. If 0.60-0.84: move but add ai_flagged: true
      6. If < 0.60: leave in place, log reasoning
      7. Create/append to daily decision ledger entry
      8. Report: items processed, filed, flagged, skipped

  - name: daily-digest
    agent: pkm-operator
    description: Generate daily morning digest note
    tier: standard
    category: digest
    services_used:
      - service: vault
        operations: [read, search, create]
      - service: calendar
        operations: [read]
      - service: tasks
        operations: [read]
    trigger:
      schedule: "0 7 * * *"
    graph: critique-refine
    graph_config:
      critique_criteria: [completeness, accuracy, tone, actionability]
      max_critique_rounds: 2
    prompt: |
      Generate a daily morning digest for the Obsidian PKM vault.

      Produce a concise daily digest note at calendar/logs/digests/YYYY-MM-DD-digest.md
      that is transcluded into the daily log via ![[YYYY-MM-DD-digest]]. The digest
      should be scannable in under 2 minutes on a phone screen.

      Steps:
      1. Get today's date and calendar events
      2. Check active efforts (status: on) for recent activity
      3. Check Things tasks due today
      4. Search vault for recent changes (last 24h)
      5. Compose digest with sections: Calendar, Efforts, Tasks, Recent Activity
      6. Write digest note with correct frontmatter (llm_generated: true)
      7. Ensure daily log note exists and includes transclusion

  - name: weekly-digest
    agent: pkm-operator
    description: Generate weekly digest note
    tier: standard
    category: digest
    services_used:
      - service: vault
        operations: [read, search, create]
      - service: calendar
        operations: [read]
      - service: tasks
        operations: [read]
    trigger:
      schedule: "0 7 * * 1"
    graph: critique-refine
    graph_config:
      critique_criteria: [completeness, accuracy, tone, actionability]
      max_critique_rounds: 2
    prompt: |
      Generate a weekly digest for the Obsidian PKM vault.

      Produce a concise weekly digest note at calendar/logs/digests/YYYY-WNN-digest.md
      (ISO week number). The digest gives a week-at-a-glance view: what happened
      in the family, what the active efforts are, and what needs attention.
      Scannable in under 3 minutes.

      Steps:
      1. Get the ISO week number and date range
      2. Fetch calendar events for the full week
      3. Check all active efforts for week's activity
      4. Check Things tasks completed this week and upcoming
      5. Search vault for significant changes
      6. Compose digest with sections: Week Overview, Calendar, Efforts, Tasks
      7. Write weekly digest note with correct frontmatter

  - name: decompose-inbox
    agent: pkm-operator
    description: Decompose text blobs into discrete vault artefacts
    tier: standard
    category: transform
    services_used:
      - service: vault
        operations: [read, create, append]
      - service: tasks
        operations: [create]
    trigger:
      on_demand: true
    graph: react-verify
    prompt: |
      Take text blobs — unstructured captures containing multiple embedded
      action items, decisions, or updates — and break them into discrete,
      actionable vault artefacts (jobs, Things tasks, effort-note appends).

      This skill runs after the inbox classifier. The classifier determines
      where a blob belongs. The decomposer determines what discrete items
      are inside it and creates the appropriate artefacts.

      Steps:
      1. Read the target blob/note
      2. Identify distinct action items, decisions, tasks, and updates
      3. For each item: determine type (job, task, note-append, correspondence)
      4. Create appropriate artefacts with correct frontmatter
      5. Link artefacts to parent effort/objective where applicable
      6. Report: items extracted, artefacts created

  - name: morning-sweep
    agent: pkm-operator
    description: Interactive morning triage across all sources
    tier: standard
    category: triage
    services_used:
      - service: vault
        operations: [read, search]
      - service: calendar
        operations: [read]
      - service: tasks
        operations: [read]
    trigger:
      on_demand: true
    graph: cascade
    graph_config:
      confidence_threshold: 0.80
      classify_tier: fast
      escalation_tier: standard
    prompt: |
      Run a structured morning sweep: aggregate pending work from all sources,
      classify each item, present for human approval, then dispatch approved work.

      This is the interactive triage layer that sits between automated dispatch
      and ad-hoc work. It gives a single view of everything pending, classified
      by who should handle it.

      Steps:
      1. Check today's calendar for time-sensitive items
      2. Check Things inbox and today list
      3. Check vault +/ingest/ and +/handoff/ for pending items
      4. Search active efforts for stale or blocked items
      5. Classify each item: AI operator, AI-assisted, human-only, or skip
      6. Present classified list for review
      7. Report summary of pending work by category

  # --- Comms operations (comms-operator) ---

  - name: email-triage
    agent: comms-operator
    description: Triage inbox email for relevant items
    tier: standard
    category: triage
    services_used:
      - service: vault
        operations: [read, create]
      - service: email
        operations: [read, search]
      - service: tasks
        operations: [create]
    trigger:
      schedule: "0 8,12,17 * * *"
    graph: cascade
    graph_config:
      confidence_threshold: 0.85
      classify_tier: fast
      escalation_tier: reasoning
    prompt: |
      Scan configured email providers for emails relevant to active areas of
      influence. Create handoff notes for relevant items. Ignore everything else.

      This is a relevance filter, not a full email assistant. Read recent inbox
      messages, match them against active domains, and surface only what matters.
      Do not archive, delete, or send email — this is read-only triage.

      Steps:
      1. For each available email provider:
         a. Check state for changes since last run
         b. Fetch recent inbox messages (last 48h or since watermark)
      2. For each message: classify relevance against active domains
      3. For relevant messages: create handoff note in +/handoff/
      4. For urgent items: create Things task
      5. Report: total scanned per provider, relevant found, handoffs created

  # --- Knowledge base — wiki-maintain trio (pkm-operator, DD-194) ---

  - name: wiki-maintain-enrich
    agent: pkm-operator
    description: Auto-enrich newly-filed vault notes with bidirectional entity backlinks
    tier: standard  # entity extraction + name resolution; templated graph mutation
    category: transform
    services_used:
      - service: vault
        operations: [read, search, lens_fts, append, create]
    trigger:
      watch: ["+/ingest", "+/triage", "+/handoff"]
    graph: react-extract  # tool-loop ending in a structured per-card backlink list
    prompt: |
      After a new note is filed in the vault, enrich the vault graph: extract
      entity mentions (people, organisations, efforts), resolve each to a
      vault card, apply the privacy gate, and write a dated back-reference
      line to each matched card. Update the knowledge index and log; index
      the new note in Lens.

      This is the **compounding step** of the wiki-maintenance layer — each
      ingest deposits cross-references that accumulate into a navigable
      knowledge graph over time.

      Steps:
      1. Read the newly-filed note via {{vault.read}}.
      2. Extract entity candidates with type (person | organisation | effort)
         and confidence score (0.0–1.0). Boost confidence on full proper
         names, wikilink form, and matches against vault entities. Penalise
         pronouns and partial mentions.
      3. For each candidate above the configured threshold, resolve to a
         vault card via {{vault.search}} or {{vault.lens_fts}}.
      4. Apply privacy gate — never write back-references to cards that
         carry `publish: false` AND the source note carries `publish: true`,
         or vice-versa.
      5. Append a dated back-reference line to each matched card via
         {{vault.append}}. Format: `- <date> · [[source-note-path]] —
         <one-line context>`.
      6. Update `atlas/utilities/knowledge-index.md` (entity → ref count)
         and `atlas/utilities/knowledge-log.md` (run summary).
      7. Index the source note in Lens.
      8. Report: candidates found, matched, written, skipped (per gate).

  - name: wiki-maintain-query
    agent: pkm-operator
    description: Answer a question by retrieving + synthesising vault passages with citations
    tier: standard  # retrieval-augmented synthesis; no novel reasoning beyond grounding
    category: report
    services_used:
      - service: vault
        operations: [read, search, lens_fts, lens_recall, create, append]
    trigger:
      on_demand: true
    graph: react-verify  # tool-loop with confidence + citation-grounding self-check
    inputs:
      - key: question
        type: string
        label: Question
        description: "The question to answer from the knowledge base"
        required: true
      - key: context_path
        type: string
        label: Scope (optional)
        description: "Vault path or effort note to scope the search to. Omit for vault-wide."
        required: false
    prompt: |
      Answer a question by synthesising from the knowledge base. Select the
      most relevant vault passages, synthesise a grounded answer with
      wikilink citations, and optionally file the synthesis as a new note.

      This is the **query step** of the wiki layer — it makes accumulated
      enrichment accessible on demand.

      Steps:
      1. Parse the question. If `{{config.context_path}}` is set, scope all
         retrieval to passages within that path; otherwise search vault-wide.
      2. Retrieve candidate passages via {{vault.lens_recall}} (top-k
         passages by semantic similarity) and {{vault.lens_fts}} (top-k by
         keyword). Merge + deduplicate.
      3. Read each candidate passage via {{vault.read}} for full context.
      4. Synthesise a grounded answer. Every claim must cite at least one
         retrieved passage by wikilink. If no passage supports a claim,
         either drop the claim or mark it as inference.
      5. Self-check: re-read the answer; for each citation, verify the
         cited passage actually supports the claim. Drop or rephrase any
         unsupported claim.
      6. If answer length and citation count exceed configured thresholds,
         file as a synthesis note at `atlas/synthesis/YYYY-MM-DD-<slug>.md`
         with `kind: synthesis, llm_generated: true, publish: false`
         frontmatter, and append a back-reference line to each cited source
         per the wiki-maintain-enrich convention.
      7. Return the answer with inline citations for the Ask bar to render.

  - name: wiki-maintain-lint
    agent: pkm-operator
    description: Weekly vault health pass — stale cards, orphans, dormant efforts, contradictions
    tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read, search, query_properties, lens_fts, create]
    trigger:
      schedule: "0 3 * * 0"
    briefing:
      card_id: stallari-core-wiki-lint
      refresh_interval: 7d
      priority: 6
      dismissal: per-version
    prompt: |
      Run a weekly vault health pass: find stale entity cards, orphaned
      notes, dormant efforts, and contradiction candidates. Write a lint
      report and emit a notification summary.

      This is the **maintenance step** of the wiki layer — it surfaces
      decay that compounding enrichment cannot detect.

      Steps:
      1. Stale cards: query for entity cards whose `last_interaction`
         frontmatter is older than {{config.stale_card_days}} days, OR
         where the card body has no inbound back-references logged in the
         past {{config.stale_card_days}} days.
      2. Orphans: find notes with zero inbound wikilinks AND zero outbound
         wikilinks (truly disconnected from the graph).
      3. Dormant efforts: query for notes with `kind: effort` and
         `status: on` whose body has not been modified in the past
         {{config.dormant_effort_days}} days. Record a recommendation that
         the human dispatch a `wiki-maintain-query` for the effort path.
         Do **not** auto-dispatch.
      4. Synthesis contradictions: scan recent synthesis notes; for each,
         check whether any cited source has been substantively modified
         since the synthesis was written. Flag as contradiction candidate
         if so.
      5. Write the report to `atlas/utilities/knowledge-lint/YYYY-WW.md`
         with sections: Stale cards · Orphans · Dormant efforts · Synthesis
         contradictions. Frontmatter `kind: knowledge-lint,
         llm_generated: true, publish: false`.
      6. Emit a notification envelope (counts only — full identifiers stay
         in the vault note):
         ```json
         {
           "notification_title": "Knowledge lint — week <WW>",
           "notification_body": "<N stale> · <N orphans> · <N dormant> · <N contradiction>",
           "notification_priority": 1,
           "notification_category": "digest"
         }
         ```
      7. Return the report summary for the briefing card.

  - name: wiki-maintain-distil
    agent: pkm-operator
    description: Bootstrap entity structure across a legacy PKM corpus — propose stub cards via per-batch handoff notes (HITL plan-execute, two-mode loop)
    tier: reasoning  # entity disambiguation across messy legacy text
    category: ingest
    services_used:
      - service: vault
        operations: [read, search, files, lens_fts, lens_remember, create, append, property_set]
    trigger:
      on_demand: true
    inputs:
      - key: target_path
        type: string
        label: Corpus folder
        description: >
          Vault path to the corpus to distil (recursive). Examples:
          atlas/source/articles, +/notes/legacy-import,
          spaces/Personal/Areas/Reading. For non-vault corpora
          (~/Documents/Articles/, Evernote exports, downloaded paper
          collections), drop the files into +/ingest/ first and let
          process-inbox file them, then run distil with target_path
          pointing at wherever they landed.
        required: true
      - key: entity_types
        type: enum_array
        values: [person, organisation, place, topic, effort]
        default: [person, organisation]
        label: Entity types to extract
        description: >
          Default `[person, organisation]` (highest signal classes).
          Add `place`, `topic`, or `effort` opt-in per corpus — `topic`
          stays opt-in always (every article has 5; topic cards become
          ontology, not entities). The dropped-by-type counts in the
          batch report tell you what the corpus actually contains.
        required: false
      - key: confidence_threshold
        type: float
        default: 0.7
        min: 0.5
        max: 0.95
        label: Confidence threshold
        description: >
          Candidates below this are dropped silently. 0.7 is a
          conservative default; lower if too few candidates surface;
          higher if too many low-signal items reach the handoff.
        required: false
      - key: max_proposals_per_batch
        type: int
        default: 20
        min: 5
        max: 50
        label: Candidates per batch
        description: >
          Cap on candidates per handoff note — prevents review fatigue
          on large corpora. A 200-candidate corpus chunks into ~10
          batches of 20.
        required: false
      - key: existing_card_search_root
        type: string
        default: atlas/
        label: Existing-card search root
        description: >
          Where to look for already-existing cards before proposing a
          new one. Defaults to atlas/ (covers atlas/people/,
          atlas/people/public/, atlas/orgs/). Family-card paths under
          spaces/People/family/ are always checked regardless and
          default to `merge` (never auto-create new family cards).
        required: false
    graph: plan-execute  # high-blast-radius — creates new vault cards via per-batch handoff
    briefing:
      card_id: stallari-core-wiki-distil
      refresh_interval: 7d
      priority: 7
      dismissal: per-version
    prompt: |
      Bootstrap entity structure across a legacy PKM corpus.

      v1 surface: per-batch handoff notes in `+/handoff/` (DD-218 v1;
      migrates to the generalised Classifications page when DD-224 Phase
      C lands). Two-mode loop — Propose emits a batch + returns; Execute
      reads a marked-up handoff + writes vault cards.

      Recommended onboarding (for non-vault corpora):
      distil only operates on vault paths. If your corpus lives outside
      the vault — `~/Documents/Articles/`, an Evernote export, a
      downloaded paper collection — first drop the files into `+/ingest/`
      and let process-inbox file each item (typically as
      `kind: source/article` or whatever the inbox classifier picks).
      Then run distil with `target_path` pointing at wherever
      process-inbox filed them.

      Steps:
      1. Pre-flight: agentic-timestamp; resolve {{config.target_path}};
         load progress.json (or initialise); load name_alias_map.
      2. Mode dispatch: if any unprocessed handoff exists at
         `+/handoff/distil-<slug>-batch*-*.md` with frontmatter
         `status: awaiting-review`, run Execute mode on it; else run
         Propose mode.

      Propose mode:
      3. Walk {{config.target_path}} files alphabetically by full vault
         path starting at `last_offset`; cap at
         {{config.max_proposals_per_batch}} candidates.
      4. For each source file: read body via {{vault.read}}; LLM extracts
         entity candidates (name + type + confidence + source-paragraph)
         where type is in {{config.entity_types}}.
      5. Drop candidates below {{config.confidence_threshold}};
         record dropped-by-type counts.
      6. For each surviving candidate (confidence-descending):
         a. Check `name_alias_map` first — if present,
            default_decision: merge with the aliased path.
         b. Else existing-card check via {{vault.lens_fts}} across
            {{config.existing_card_search_root}} + the closed list of
            person-card paths from vault-reference.md §1a.
         c. Match in `spaces/People/family/` → ALWAYS default merge.
         d. Else: match → default merge; high-confidence + no match →
            default accept; mid-confidence + no match → default review.
      7. Write handoff note to
         `+/handoff/distil-<slug>-batch<N>-<date>.md` with frontmatter
         `kind: distil-handoff, status: awaiting-review, ...` and a
         Markdown table (one row per candidate; `Decision` column
         pre-populated with `Default` so an unchanged file = "all
         defaults apply").
      8. Write distillation report to
         `atlas/utilities/knowledge-distil/<slug>-<date>.md` (4 body
         sections including dropped-by-type counts).
      9. Update progress.json (advance `last_offset`, increment
         `batch_n`).
      10. Emit notification envelope:
          ```json
          {
            "notification_title": "Distil batch <N> ready — <slug>",
            "notification_body": "<N> candidates · <K> accept · <M> merge · <P> review · dropped: place X, topic Y",
            "notification_priority": 3,
            "notification_category": "task"
          }
          ```

      Execute mode:
      11. Read the handoff note; parse the Markdown table.
      12. For each row's `Decision`:
          - `accept`: create stub card at proposed path with frontmatter
            (`kind: person|organisation, llm_generated: true,
            distil_source, distil_batch`); append back-references to
            sources and to the new card per enrich convention.
          - `reject`: append `<slug> · <name> · <type>` to
            `atlas/utilities/knowledge-distil-rejects.md`.
          - `merge with [[<path>]]`: append source mentions to the
            existing card; update `name_alias_map[<row_name>] = <path>`.
          - `rename to <new>`: same as accept but at the renamed path;
            update `name_alias_map[<row_name>] = <renamed_path>`.
          - `defer` or empty or `review`: leave row as-is; row stays in
            the handoff for next batch.
      13. Privacy gate: never wikilink across mismatched `publish:`
          boundaries (matches enrich convention).
      14. Update handoff frontmatter: `status: processed`,
          `processed_at: <iso>`. Update the matching distillation
          report's `## Decisions executed` section.
      15. Index new cards in Lens via {{vault.lens_remember}}.
      16. Update progress.json counts; persist `name_alias_map`.
      17. Emit execute notification (counts of accepted/merged/rejected/
          renamed/deferred).
      18. Re-enter Propose mode (Step 3) to emit the next batch.

  # --- Scheduling operations (scheduling-operator) ---

  - name: calendar-sync
    agent: scheduling-operator
    description: Detect calendar conflicts, match events to efforts
    tier: standard
    category: sync
    services_used:
      - service: calendar
        operations: [read, search, freebusy]
      - service: vault
        operations: [read]
    trigger:
      on_demand: true
    graph: react-extract
    prompt: |
      Detect calendar conflicts, match events to active efforts, and surface
      scheduling issues. Read-only calendar access — no event creation or
      modification.

      Steps:
      1. Get current date and week context
      2. Fetch upcoming events (next 7 days) from all calendars
      3. Check free/busy for conflict detection
      4. Detect overlaps, scheduling pressure, and double-bookings
      5. Match events to active vault efforts
      6. Present structured conflict and scheduling report

  - name: schedule-event
    agent: scheduling-operator
    description: Interactive calendar event creation
    tier: standard
    category: transform
    services_used:
      - service: calendar
        operations: [read, freebusy]
      - service: tasks
        operations: [create]
    trigger:
      on_demand: true
    graph: react-extract
    prompt: |
      Create a calendar event interactively. Check free/busy, present a proposal,
      confirm with the human, and create the event.

      Steps:
      1. Gather event details (title, date, time, duration, location)
      2. Check free/busy for the proposed time
      3. Present proposal with schedule context
      4. On confirmation, create the event
      5. Optionally create a preparation task

  - name: process-calendar-handoffs
    agent: scheduling-operator
    description: Process calendar handoffs from other operators
    tier: standard
    category: sync
    services_used:
      - service: calendar
        operations: [read, freebusy]
      - service: vault
        operations: [read, append]
    trigger:
      on_demand: true
    graph: react-extract
    prompt: |
      Process structured calendar handoff notes from +/handoff/ targeting
      scheduling-operator. Validate event data, check for conflicts, create
      calendar events, and mark handoffs as processed.

      Steps:
      1. Scan +/handoff/ for notes with target: scheduling-operator
      2. For each: validate fields, check free/busy, create event
      3. Mark handoffs as processed
      4. Log all actions to decision ledger

  # --- Security operations (secops-operator) ---

  - name: darwin-state-audit
    agent: secops-operator
    description: Audit macOS imperative state residue and security posture
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Audit macOS security posture: SIP, Gatekeeper, FileVault, TCC grants,
      sharing services, network exposure, pf firewall, sudoers. Write findings
      to a structured registry note at
      atlas/registers/system/darwin-state-audit-{hostname}.md.

  - name: tcc-drift-monitor
    agent: secops-operator
    description: Monitor TCC privacy grant changes
    tier: standard
    category: review
    requires_capabilities: [shell]
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      schedule: "0 6 * * *"
    graph: cascade
    graph_config:
      confidence_threshold: 0.90
      classify_tier: fast
      escalation_tier: standard
    prompt: |
      Check TCC privacy grants for unexpected changes since last run. Alert on
      new grants to unsigned or ad-hoc binaries. Compare against known-good baseline.
      Use the sandboxed shell (DD-188 L2 RestrictedShell) to read
      ~/Library/Application\ Support/com.apple.TCC/TCC.db via
      `sqlite3 -readonly`.

  - name: credential-expiry-watch
    agent: secops-operator
    description: Check credential freshness and expiry
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      schedule: "0 6 * * *"
    graph: cascade
    graph_config:
      confidence_threshold: 0.90
      classify_tier: fast
      escalation_tier: standard
    prompt: |
      Scan stored credentials for approaching expiry. Check API tokens, TLS certs,
      and OAuth refresh tokens. Alert on credentials expiring within 7 days.

  - name: network-exposure-scan
    agent: secops-operator
    description: Scan for unexpected network listeners
    tier: standard
    category: review
    requires_capabilities: [shell]
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      schedule: "0 6 * * *"
    graph: cascade
    graph_config:
      confidence_threshold: 0.90
      classify_tier: fast
      escalation_tier: standard
    prompt: |
      Scan for unexpected network listeners and open ports. Compare against
      known services. Alert on unrecognised listeners. Use the sandboxed
      shell (DD-188 L2 RestrictedShell) to run `lsof -iTCP -sTCP:LISTEN -nP`,
      `netstat -an`, and `pfctl -sr` (read-only).

  - name: security-correlation
    agent: secops-operator
    description: Correlate security events across audit sources
    tier: reasoning
    fallback_tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Correlate findings from TCC, launchd, network, and credential audits.
      Identify patterns that indicate drift or compromise. Produce summary report.

  - name: fleet-trust-audit
    agent: secops-operator
    description: Audit fleet peer trust and enrollment integrity
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Audit fleet enrollment state: verify peer tokens, check stale enrollments,
      validate trust chain. Flag peers that haven't been seen recently.

  # --- Fleet operations (fleet-operator) ---

  - name: platform-health
    agent: fleet-operator
    description: Probe daemon, MCP servers, Lens, and identity provider health
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Probe Stallari platform health on the current host. Check daemon status,
      MCP server connectivity, Lens index health, and tsidp reachability.
      Write findings to a structured registry note at
      atlas/registers/system/platform-health-{hostname}.md.

  - name: version-drift-check
    agent: fleet-operator
    description: Compare component versions across fleet peers
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Compare Stallari daemon and MCP plugin versions between the current host
      and configured fleet peers. Flag version drift. Write a drift report to
      atlas/registers/system/version-drift-{date}.md.

  - name: dispatch-analytics
    agent: fleet-operator
    description: Analyse dispatch success rates and performance
    tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Analyse dispatch trace history: success rates, failure patterns, duration
      trends, provider utilisation. Produce summary with actionable insights.

  - name: mcp-lifecycle
    agent: fleet-operator
    description: Detect unused or unhealthy MCP servers and manage lifecycle
    tier: reasoning
    fallback_tier: standard
    category: review
    requires_capabilities: [shell]
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      schedule: "0 */4 * * *"
      on_demand: true
    graph: react
    prompt: |
      Audit MCP server fleet health and lifecycle. Use the sandboxed shell
      (DD-188 L2 RestrictedShell) to run `ps`, `lsof -p <pid>`, and read
      launchd state for MCP-related agents.

      1. **Process health** — check MCP server processes for orphans, resource
         leaks, restart loops, and servers exceeding resource budgets.
      2. **Usage analysis** — identify MCP servers with no invocations in the
         last 30+ days. Flag as candidates for decommission or reconfiguration.
      3. **Error patterns** — detect servers with repeated errors, elevated
         latency, or degraded availability. Suggest restart or investigation.
      4. **Cleanup actions** — for unused or unhealthy servers, recommend
         specific actions (restart, disable, remove from config).

      Write a structured audit note to the vault with findings and actions.

  - name: capacity-forecast
    agent: fleet-operator
    description: Forecast infrastructure capacity needs
    tier: reasoning
    fallback_tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Analyse resource trends (disk, memory, dispatch load) and forecast
      capacity needs. Flag resources approaching limits.

  - name: upgrade-coordinator
    agent: fleet-operator
    description: Coordinate fleet-wide upgrades
    tier: reasoning
    fallback_tier: standard
    category: sync
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: plan-execute
    graph_config:
      max_replan_attempts: 2
    prompt: |
      Plan and coordinate fleet-wide upgrades: check compatibility, stage
      rollout order, verify post-upgrade health.

  # --- Notification operations (notifications-operator) ---

  - name: notification-channel-status
    agent: notifications-operator
    description: Probe notification delivery channel health
    tier: standard
    category: review
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Probe all configured notification delivery channels (APNS, iCloud KV,
      assistant-bot, email handoff). Write channel health report to
      atlas/registers/notifications/channel-health.md.

  - name: notification-delivery-audit
    agent: notifications-operator
    description: Aggregate delivery stats and flag unreliable channels
    tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Read delivery reports from the last 7 days. Aggregate per-channel
      and per-category statistics. Flag unreliable channels. Write audit
      summary to atlas/registers/notifications/delivery-audit.md.

  - name: delivery-report
    agent: notifications-operator
    description: Daily aggregate of all notification deliveries
    tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read, create]
    trigger:
      schedule: "0 23 * * *"
    graph: react
    prompt: |
      Generate daily notification delivery report. Aggregate by channel
      and category. Archive to calendar/notes/{date} — notification
      delivery report.md.

  # --- Registry operations (fleet-operator) ---

  - name: registry-publish
    agent: fleet-operator
    description: Publish a local pack to the org registry
    tier: standard
    category: sync
    services_used:
      - service: vault
        operations: [read]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Publish a pack to the local org registry. Reads the pack manifest,
      validates it, and publishes to the registry server.

      Steps:
      1. Read the pack manifest YAML from the specified path
      2. Validate manifest against pack schema
      3. POST to /registry/packs/{name}/{version} on the local daemon
      4. Report: pack name, version, org, publish status

  - name: registry-list
    agent: fleet-operator
    description: List packs in the org registry
    tier: standard
    category: report
    services_used:
      - service: vault
        operations: [read]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      List all packs available in the local org registry.

      Steps:
      1. GET /registry/catalog from the local daemon
      2. Format output: name, version, org, last updated
      3. Report: total packs, per-org breakdown

  - name: registry-remove
    agent: fleet-operator
    description: Remove a pack from the org registry
    tier: standard
    category: sync
    services_used:
      - service: vault
        operations: [read]
    trigger:
      on_demand: true
    graph: react
    prompt: |
      Remove a pack from the local org registry.

      Steps:
      1. Confirm pack name with the user
      2. DELETE /registry/packs/{name} on the local daemon
      3. Report: pack name, removal status

