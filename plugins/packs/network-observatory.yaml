pack: "1.8"
name: network-observatory
title: "Network Observatory"
featured: true
version: "1.1.0"
tagline: "Full-stack network visibility — from satellite downlink to DNS query, every layer in one conversation"
description: >-
  Cross-layer network monitoring and diagnosis — ISP accounts, DNS filtering,
  local infrastructure, overlay networks, and LEO satellite terminals. Five
  services, one agent, eight skills that correlate across the entire stack.
  Daily new-device alerts, weekly digest briefing card, and at-a-glance
  stack-health card.
icon: /icons/network-observatory.svg
author:
  name: Stallari
  url: https://stallari.ai
license: Proprietary
visibility: open
tier: certified
author_type: first-party
readiness: beta
pricing: null
bundled: false

readme:
  format: markdown
  body: |
    # Network Observatory

    Full-stack network visibility for Stallari — from LEO satellite downlink
    to ISP handoff to local routing to overlay mesh to DNS privacy. Every
    layer of your network, observable and diagnosable from a single
    conversation.

    ## What it does

    This pack treats your entire network stack as one observable system.
    Instead of logging into five dashboards (ISP portal, DNS filtering
    console, UniFi controller, Tailscale admin, Starlink app), you ask
    your agent.

    ## Layer model

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **WAN** | ISP account | `isp-v1` | Usage, outages, billing, line diagnostics |
    | **DNS** | DNS filtering | `protective-dns-v1` | Profiles, filters, rules, blocked services |
    | **LAN** | Network infra | `network-v1` | Devices, clients, firewall, traffic rules |
    | **Overlay** | VPN/mesh | `overlay-network-v1` | Devices, ACLs, keys, routes, audit |
    | **Uplink** | LEO terminal | `leo-modem-v1` | Signal, obstruction, alerts, throughput |

    ## Skills overview

    ### Observability
    - **stack-health** — One-command health check across every layer (Today briefing card)
    - **network-census** — Full device and endpoint inventory across all layers
    - **morning-network-brief** — Daily status digest (Today briefing card + digest notification)
    - **weekly-network-digest** — Weekly trend (Today briefing card + digest notification)

    ### Diagnosis
    - **connectivity-triage** — Layer-by-layer diagnosis when something breaks; alerts on down/severe-degrade
    - **dns-security-audit** — DNS filtering coverage, firewall policies, overlay ACLs; alerts on critical findings

    ### Watchers
    - **new-device-alert** — Daily LAN-device-appeared notification

    ## Why this pack

    - **Five service contracts** spanning the full network stack
    - **Graceful degradation** — install only the layers you have
    - **Cross-layer correlation** — ISP outage + Starlink failover + overlay
      reroute, understood together
    - **Plugin choice** — swap providers without changing skills (Aussie BB →
      any ISP plugin)
    - **Read-heavy, write-gated** — monitoring by default, mutations only
      with confirmation (data-001)

highlights:
  - "Five service contracts — ISP, DNS, LAN, overlay, and LEO terminal in one pack"
  - "Graceful degradation — install only the layers you have, skip the rest"
  - "Cross-layer correlation — diagnose issues that span ISP, local network, and overlay"
  - "Today briefing cards — stack-health, morning brief, weekly digest"
  - "Watchers — daily new-device alerts, on-demand connectivity-triage with severity-driven notifications"
  - "Read-heavy, write-gated — monitoring by default, never mutates without confirmation"

