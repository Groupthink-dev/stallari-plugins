readme:
  format: markdown
  body: |
    # Speculator

    Cross-market pricing intelligence for Stallari — betting exchanges,
    prediction markets, and securities brokerage unified in one
    conversation. The same event priced three different ways, compared
    in seconds.

    ## What it does

    Markets disagree. An election has odds on Betfair, a price on
    Polymarket, and options pricing on IB. A sporting event has
    exchange odds on Betfair and correlated futures on IB. This pack
    lets your agent see all three price sources simultaneously and
    flag when they diverge.

    ## Market stack

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **Exchange** | Betting exchange | `betting-exchange-v1` | Sports/event odds, market books, P&L, settlements |
    | **Prediction** | Prediction market | `prediction-market-v1` | Binary outcomes, orderbooks, analytics, leaderboards |
    | **Securities** | Brokerage | `brokerage-v1` | Portfolio, quotes, historical data, scanners |

    ## Skills overview

    ### Analysis
    - **market-scan** — Cross-market event search (3 price sources)
    - **price-check** — Implied probability comparison

    ### Portfolio
    - **exposure-report** — Open positions + P&L (Today briefing card)
    - **settlement-review** — Cleared bets, resolved predictions, recent trades

    ### Discovery
    - **morning-markets** — Pre-open brief (Today briefing card + digest notification)
    - **closing-bell-brief** — Post-close brief (Today briefing card + digest notification)

    ### Watchers
    - **watchlist-movement-alert** — Daily check for >X% moves on watched markets

    ## Safety model

    This pack is **STRICTLY read-only** (data-001 + identity-001). It
    never places orders, bets, or trades. Real money is at stake across
    all three services — the read-only constraint is non-negotiable. If
    you need to trade, use the individual plugins with write mode
    enabled.

    Account balances + position sizes treated as sensitive (data-002):
    notifications use percentage changes only, never absolute dollar
    positions.

highlights:
  - "Three market types — betting exchange, prediction market, and brokerage in one view"
  - "Cross-market pricing — same event compared across Betfair, Polymarket, and IB"
  - "Three Today briefing cards — exposure, opening brief, closing brief"
  - "Watchlist movement alerts — daily >X% move detection across configured markets"
  - "STRICTLY read-only — no order execution under any circumstance (identity-001)"
  - "Position sizes never published in notifications — % changes only (data-002)"

