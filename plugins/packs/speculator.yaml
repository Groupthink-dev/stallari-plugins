pack: "1.8"
name: speculator
title: "Speculator"
featured: true
version: "1.1.0"
tagline: "Betting exchanges, prediction markets, and brokerage — cross-market pricing in one conversation"
description: >-
  Cross-market speculation and analysis — Betfair exchange odds,
  Polymarket prediction prices, and Interactive Brokers portfolio data.
  Three market types, one agent, seven skills (incl. opening + closing
  briefs, watchlist movement alerts, exposure briefing card). Strictly
  read-only — no order execution under any circumstance.
