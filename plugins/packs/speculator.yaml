    - id: data-002
      category: data-handling
      severity: critical
      scope: [community, verified, certified]
      added: "2026-05-02"

    - id: identity-001
      category: identity
      severity: critical
      scope: [community, verified, certified]
      added: "2026-05-02"

    - id: exfil-001
      category: exfiltration
      severity: high
      scope: [community, verified, certified]
