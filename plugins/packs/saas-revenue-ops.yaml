pack: "1.8"
name: saas-revenue-ops
title: "SaaS Revenue Ops"
featured: true
version: "1.1.0"
tagline: "Subscriptions, orders, and delivery in one view — Paddle, Shopify, and Resend unified"
description: >-
  End-to-end SaaS and e-commerce revenue operations — subscription billing,
  storefront orders, and transactional email delivery. Three services, one
  agent, seven skills (incl. weekly digest + failed-payment alert briefing
  surface) that follow the money from checkout to inbox.
icon: /icons/saas-revenue-ops.svg
author:
  name: Stallari
  url: https://stallari.ai
license: Proprietary
visibility: open
tier: certified
author_type: first-party
readiness: beta
pricing: null
bundled: false

readme:
  format: markdown
  body: |
    # SaaS Revenue Ops

    End-to-end revenue operations for Stallari — subscription billing,
    storefront management, and transactional email delivery unified in
    one conversation. Stop switching between Paddle, Shopify, and Resend
    dashboards.

    ## What it does

    This pack treats your revenue stack as one observable pipeline. A
    customer subscribes (Paddle), orders a product (Shopify), and
    receives a confirmation email (Resend). Your agent can trace that
    entire flow, diagnose where it broke, and report on the health of
    each layer.

    ## Revenue stack

    | Layer | Service | Contract | What you see |
    |-------|---------|----------|-------------|
    | **Billing** | Subscriptions | `billing-v1` | Products, prices, subscriptions, transactions, MRR |
    | **Commerce** | Storefront | `ecommerce-v1` | Products, orders, customers, inventory, fulfillment |
    | **Delivery** | Email | `transactional-email-v1` | Sends, delivery status, domains, contacts, broadcasts |

    ## Skills overview

    ### Observability
    - **revenue-pulse** — at-a-glance dashboard (Today briefing card)
    - **pipeline-health** — end-to-end audit (on-demand, alerts on broken)

    ### Investigation
    - **customer-lookup** — unified customer view (on-demand)
    - **churn-triage** — root-cause investigation with timeline (on-demand)

    ### Reporting
    - **morning-revenue-brief** — daily digest (Today briefing card)
    - **weekly-revenue-digest** — weekly trend + cohort movement (Today briefing card)

    ### Watchers
    - **failed-payment-alert** — daily failed-payment cluster detection (P4 alert)

    ## Safety model

    This pack is **read-only** (data-001). It never creates subscriptions,
    processes refunds, fulfills orders, or sends emails. Customer email
    addresses + names treated as personal — notification bodies use
    counts and hashed identifiers per exfil-001. Payment method details
    are masked per data-002.

highlights:
  - "Three revenue layers — billing, commerce, and email delivery in one view"
  - "Cross-layer correlation — trace a customer from subscription to order to email"
  - "Three Today briefing cards — pulse, daily brief, weekly digest"
  - "Daily failed-payment alert + on-demand pipeline-health alerts"
  - "Read-only by default — payment details masked, customer PII hashed in notifications"

links:
  - label: Stallari Marketplace
    url: https://marketplace.stallari.app
  - label: Billing contract (billing-v1)
