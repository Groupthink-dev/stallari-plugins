  - icon: "\U0001F4CA"
    text: "Cost tracking — per-property CSV registers, Excel-compatible"
  - icon: "\U0001F4C5"
    text: "Monthly audit — flags overdue items with urgency-appropriate thresholds"
  - icon: "\U0001F3E0"
