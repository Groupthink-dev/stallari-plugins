config:
  user_inputs:
    - key: ingest_path
      type: string
      default: "+/ingest/maintenance"
      label: Maintenance ingest folder
      description: >-
        Vault-relative path to the folder where you drop photos, voice memos,
        or text notes about maintenance issues. The pack watches this folder.

    - key: properties
      type: object
      label: Properties
      required: true
      description: >-
        Map of property slugs to vault area paths. Each property gets its own
        maintenance subfolder and cost CSV. Example:
        { "sandy-bay": { "vault_path": "spaces/Family Living/Areas/Property - Sandy Bay" },
          "cascade-st": { "vault_path": "spaces/Family Living/Areas/Property - Cascade St" } }

    - key: hemisphere
      type: enum
      values: [southern, northern]
      default: southern
      label: Hemisphere
      description: >-
        Drives season inference for the seasonal checklist. Affects which
        preventive items are surfaced each quarter.
