pack: "1.6"
name: morning-triage
title: "Morning Triage"
featured: true
version: "1.1.0"
description: Triages unread email and generates a morning briefing with today's calendar.
icon: /icons/morning-triage.svg
author:
  name: Jane Dev
  url: https://example.com/@janedev
licence: MIT
visibility: open
tier: community
pricing: null
tagline: "Inbox classified and calendar briefing ready before you finish coffee"

readme:
  format: markdown
  body: |
    # Morning Triage Pack

    A lightweight morning automation for Sidereal — scan your inbox, classify
    messages by urgency, and combine the results with today's calendar into
    a single morning briefing note.

    ## What it does

    This pack runs two skills in sequence on a configurable morning schedule:

    ### 1. Inbox triage

    Scans unread email from the last 24 hours and classifies each message:
    - **Urgent** — requires response today, time-sensitive, from known contacts
    - **Review** — informational, needs reading but not immediate action
    - **Low** — newsletters, notifications, marketing

    Urgent messages are flagged. Low-priority messages are moved to a
    filtered folder. The original messages are never deleted or archived.

    ### 2. Daily briefing

    Combines the triage results with today's calendar events:
    - Chronological event list with conflict highlighting
    - Urgent emails matched to calendar context (e.g., meeting prep needed)
    - Action items extracted and optionally created as tasks

    The briefing is written to a vault note at the daily log path.

    ## Who this is for

    This is a community pack designed as a simple starting point for
    morning automation. If you need more comprehensive daily productivity
    (effort tracking, weekly reviews, inbox processing), see the
    **Daily Productivity** certified pack instead.

    ## Safety model

    - Email is **read-only** — messages are classified and flagged but
      never deleted or archived
    - Task creation is optional and only fires when the tasks service
      is configured

highlights:
  - icon: "\U0001F4E8"
    text: "Urgency classification — urgent, review, and low-priority buckets"
  - icon: "\U0001F4C5"
    text: "Calendar-aware — matches urgent emails to today's meetings and events"
  - icon: "\u26A1"
    text: "Two-step pipeline — triage first, then briefing with combined context"
  - icon: "\U0001F512"
    text: "Read-only email — never deletes or archives your messages"

links:
  - label: Source Code
    url: https://github.com/groupthink-dev/sidereal-plugins
  - label: Sidereal Documentation
    url: https://sidereal.cc/docs
  - label: Pack Spec
    url: https://sidereal.cc/docs/pack-spec

min_sidereal: "0.29"

requires:
  services:
    - service: email
      operations: [search, read, mailboxes]
    - service: calendar
      operations: [events, today]
  capabilities: []

recommends:
  services:
    - service: tasks
      operations: [create]

data:
  reads: [email, calendar]
  writes: [vault, tasks]
  stores: nothing
  phones_home: false

agents:
  triage-bot:
    role: operator
    prompt: |
      You are a personal email triage assistant. Your job is to scan the inbox,
      classify messages by urgency, and produce a concise morning briefing.

      Classification rules:
      - Urgent: requires response today, time-sensitive, from known contacts
      - Review: informational, needs reading but not immediate action
      - Low: newsletters, notifications, marketing

      Always preserve the original message — never delete or archive.

skills:
  - name: triage-inbox
    agent: triage-bot
    description: Scan and classify unread email by urgency
    tier: reasoning
    category: triage
    graph: cascade
    graph_config:
      confidence_threshold: 0.85
      classify_model: claude-haiku-4-5-20251001
      escalation_model: claude-sonnet-4-6
    services_used:
      - service: email
        operations: [search, read, flag, move]
    trigger:
      schedule: "0 {{config.wake_hour}} * * *"
    prompt: |
      Search for unread messages received in the last 24 hours.
      Classify each message as urgent, review, or low.
      For urgent messages, flag them.
      Move low-priority messages to the "Filtered" folder.

      Output a structured summary:
      - Count by category
      - Top 3 urgent items with sender and subject
      - Any calendar-related messages (invites, changes)

  - name: daily-briefing
    agent: triage-bot
    description: Generate morning briefing combining email triage and calendar
    tier: reasoning
    category: digest
    graph: react
    services_used:
      - service: calendar
        operations: [events, today]
      - service: vault
        operations: [create]
      - service: tasks
        operations: [create]
    depends_on: [triage-inbox]
    prompt: |
      Using the triage results and today's calendar:

      1. List today's events in chronological order
      2. Highlight scheduling conflicts
      3. Match urgent emails to calendar context (e.g., meeting prep needed)
      4. Create a vault note at the daily log path with the briefing

      If tasks service is available, create tasks for any action items found.

workflows:
  - name: morning-run
    description: Full morning triage and briefing sequence
    schedule: "0 {{config.wake_hour}} * * *"
    steps:
      - skill: triage-inbox
      - skill: daily-briefing
        after: [triage-inbox]

config:
  user_inputs:
    - key: wake_hour
      type: number
      default: 7
      label: What hour should the morning triage run?
      description: 24-hour format (e.g., 7 for 7am, 6 for 6am)
